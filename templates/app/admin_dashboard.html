{% extends "layout.html" %}
{% block title %}Admin | Casa León{% endblock %}

{% block body %}
<div class="min-h-screen bg-cl-cream">
  <header class="bg-white/80 backdrop-blur border-b border-cl-line">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <img src="{{ url_for('static', filename='img/casaLeon.png') }}" class="h-8" alt="Casa León">
        <div>
          <p class="font-semibold text-gray-900 leading-5">Panel Admin</p>
          <p class="text-sm text-gray-600">Backoffice</p>
        </div>
      </div>
      <a href="{{ url_for('logout') }}" class="text-sm font-semibold text-red-600 hover:underline">Cerrar sesión</a>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 py-10">
    <div class="rounded-3xl border border-cl-line bg-white p-8 shadow-sm">
      <h1 class="text-3xl font-semibold text-gray-900">A trabajar 😤</h1>
      <p class="mt-2 text-gray-700">Usuarios, catálogos, compras, reportes, auditoría.</p>

      <div class="mt-8 grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
        <a href="{{ url_for('crear_usuario_staff') }}" class="rounded-2xl bg-cl-cream border border-cl-line p-5 hover:bg-white transition">
          <p class="font-semibold text-gray-900">Usuarios staff</p>
          <p class="text-sm text-gray-600 mt-1">Crear / listar</p>
        </a>
        <div class="rounded-2xl bg-cl-cream border border-cl-line p-5">
          <p class="font-semibold text-gray-900">Catálogos</p>
          <p class="text-sm text-gray-600 mt-1">Pendiente</p>
        </div>
        <div class="rounded-2xl bg-cl-cream border border-cl-line p-5">
          <p class="font-semibold text-gray-900">Reportes</p>
          <p class="text-sm text-gray-600 mt-1">Pendiente</p>
        </div>
      </div>
    </div>
  </main>
</div>
{% endblock %}
